<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App — Join</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 1.75rem;
      color: #1e1b4b;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #6b7280;
      margin-bottom: 1.75rem;
      font-size: 0.9rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.1rem;
    }

    input:focus { border-color: #4f46e5; }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💬 Chat App</h1>
    <p class="subtitle">Module 16 — Socket.io Real-Time</p>

    <label for="username">Username</label>
    <input id="username" type="text" placeholder="e.g. alice" maxlength="20" />

    <label for="room">Room</label>
    <input id="room" type="text" placeholder="e.g. general" maxlength="30" />

    <button id="joinBtn">Join Room →</button>
  </div>

  <script>
    document.getElementById('joinBtn').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim();
      const room = document.getElementById('room').value.trim();
      if (!username || !room) {
        return alert('Please enter both a username and a room name.');
      }
      const params = new URLSearchParams({ username, room });
      window.location.href = `/chat.html?${params}`;
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('joinBtn').click();
    });
  </script>
</body>
</html>
